<svg xmlns="http://www.w3.org/2000/svg" width="1060" height="860" viewBox="0 0 1060 860">
  <defs>
    <style>
      .bg     { fill: #f8fafc; }
      .entity { fill: #ffffff; stroke: #94a3b8; stroke-width: 2; }
      .head   { fill: #e2e8f0; stroke: #94a3b8; stroke-width: 2; }
      .title  { font: 700 17px Arial, sans-serif; fill: #0f172a; }
      .field  { font: 400 14px Arial, sans-serif; fill: #1e293b; }
      .small  { font: 400 13px Arial, sans-serif; fill: #475569; }
      .note   { font: 400 12px Arial, sans-serif; fill: #6b7280; font-style: italic; }
      .rel    { stroke: #64748b; stroke-width: 2; fill: none; }
      .lbl    { font: 600 12px Arial, sans-serif; fill: #334155; }
    </style>
    <marker id="arr" markerWidth="10" markerHeight="10" refX="9" refY="5"
            orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L10,5 L0,10 z" fill="#64748b"/>
    </marker>
  </defs>

  <rect class="bg" x="0" y="0" width="1060" height="860"/>
  <text x="40" y="40" class="title">ER-схема БД: Admin Service (панель управления)</text>

  <!-- ══════════════════════════════════════
       ТАБЛИЦЫ
         Row 1 (y=80):   admin_users  (центр)
         Row 2 (y=480):  admin_sessions (слева)   audit_log (справа)

       Routing corridor: y=430 — горизонтальный коридор между рядами
       ══════════════════════════════════════ -->

  <!-- admin_users -->
  <g transform="translate(290,80)">
    <rect class="entity" x="0" y="0" width="360" height="300" rx="16"/>
    <rect class="head"   x="0" y="0" width="360" height="54"  rx="16"/>
    <rect class="head"   x="0" y="36" width="360" height="18"/>
    <text x="20" y="33" class="title">admin_users</text>
    <text x="20" y="84"  class="field">PK  id</text>
    <text x="20" y="110" class="field">    login</text>
    <text x="20" y="136" class="field">    password_hash</text>
    <text x="20" y="162" class="field">    full_name</text>
    <text x="20" y="188" class="field">    role</text>
    <text x="20" y="214" class="field">    is_active</text>
    <text x="20" y="240" class="field">    created_at</text>
    <text x="20" y="266" class="field">    updated_at</text>
  </g>

  <!-- admin_sessions -->
  <g transform="translate(60,480)">
    <rect class="entity" x="0" y="0" width="360" height="275" rx="16"/>
    <rect class="head"   x="0" y="0" width="360" height="54"  rx="16"/>
    <rect class="head"   x="0" y="36" width="360" height="18"/>
    <text x="20" y="33" class="title">admin_sessions</text>
    <text x="20" y="84"  class="field">PK  id</text>
    <text x="20" y="110" class="field">FK  admin_user_id</text>
    <text x="20" y="136" class="field">    token</text>
    <text x="20" y="162" class="field">    ip_address</text>
    <text x="20" y="188" class="field">    user_agent</text>
    <text x="20" y="214" class="field">    expires_at</text>
    <text x="20" y="240" class="field">    created_at</text>
  </g>

  <!-- audit_log -->
  <g transform="translate(510,480)">
    <rect class="entity" x="0" y="0" width="380" height="300" rx="16"/>
    <rect class="head"   x="0" y="0" width="380" height="54"  rx="16"/>
    <rect class="head"   x="0" y="36" width="380" height="18"/>
    <text x="20" y="33" class="title">audit_log</text>
    <text x="20" y="84"  class="field">PK  id</text>
    <text x="20" y="110" class="field">FK  admin_user_id</text>
    <text x="20" y="136" class="field">    action</text>
    <text x="20" y="162" class="field">    entity_type</text>
    <text x="20" y="188" class="field">    entity_id</text>
    <text x="20" y="214" class="field">    old_value</text>
    <text x="20" y="240" class="field">    new_value</text>
    <text x="20" y="266" class="field">    created_at</text>
  </g>

  <!-- ══════════════════════════════════════
       СВЯЗИ
       ══════════════════════════════════════ -->

  <!-- 1. admin_users (1) ──► admin_sessions (N)   [admin_user_id FK]
       admin_users.bottom(420,380) → ↓ → y=430 → ← → sessions.top(240,480)
       Коридор y=380–480 свободен -->
  <path class="rel" marker-end="url(#arr)"
        d="M 420,380 L 420,430 L 240,430 L 240,480"/>
  <text x="298" y="422" class="lbl">1 : N</text>

  <!-- 2. admin_users (1) ──► audit_log (N)   [admin_user_id FK]
       admin_users.bottom(530,380) → ↓ → y=430 → → → audit_log.top(700,480)
       Симметрично стрелке 1 -->
  <path class="rel" marker-end="url(#arr)"
        d="M 530,380 L 530,430 L 700,430 L 700,480"/>
  <text x="590" y="422" class="lbl">1 : N</text>

  <!-- ══════════════════════════════════════
       ENUM: role
       ══════════════════════════════════════ -->
  <rect x="60" y="80" width="190" height="120" rx="12"
        fill="#f0fdf4" stroke="#86efac" stroke-width="1.5"/>
  <text x="78" y="108" style="font:700 13px Arial;fill:#166534">role (enum)</text>
  <text x="78" y="132" class="small">superadmin</text>
  <text x="78" y="156" class="small">manager</text>

  <!-- пунктир: enum → admin_users.role -->
  <path stroke="#86efac" stroke-width="1.5" stroke-dasharray="6 5" fill="none"
        d="M 250,162 L 290,188"/>

  <!-- ══════════════════════════════════════
       ПРИМЕР ЗНАЧЕНИЙ audit_log.action
       ══════════════════════════════════════ -->
  <rect x="60" y="230" width="210" height="160" rx="12"
        fill="#eff6ff" stroke="#bfdbfe" stroke-width="1.5"/>
  <text x="78" y="258" style="font:700 13px Arial;fill:#1e40af">action (примеры)</text>
  <text x="78" y="282" class="small">product.create</text>
  <text x="78" y="304" class="small">product.update</text>
  <text x="78" y="326" class="small">order.status_change</text>
  <text x="78" y="348" class="small">promo.create</text>
  <text x="78" y="370" class="small">review.approve</text>

  <!-- пунктир: примеры → audit_log.action -->
  <path stroke="#bfdbfe" stroke-width="1.5" stroke-dasharray="6 5" fill="none"
        d="M 270,326 L 510,616"/>

  <!-- ══════════════════════════════════════
       ЛЕГЕНДА
       ══════════════════════════════════════ -->
  <rect x="870" y="80" width="180" height="160" rx="14"
        fill="#ffffff" stroke="#cbd5e1" stroke-width="1.5"/>
  <text x="888" y="112" style="font:700 13px Arial;fill:#0f172a">Обозначения</text>
  <text x="888" y="136" class="small">PK — первичный ключ</text>
  <text x="888" y="158" class="small">FK — внешний ключ</text>
  <text x="888" y="180" class="small">1:N — один-ко-многим</text>

  <!-- ══════════════════════════════════════
       СНОСКА
       ══════════════════════════════════════ -->
  <text x="60" y="800" class="note">
    token — хранится хеш токена. Сессия завершается по expires_at или при явном logout.
  </text>
  <text x="60" y="822" class="note">
    old_value / new_value — JSON-снепшоты состояния сущности до и после изменения (для audit trail).
  </text>

</svg>