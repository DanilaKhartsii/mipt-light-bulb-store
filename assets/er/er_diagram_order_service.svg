<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="900" viewBox="0 0 1100 900">
  <defs>
    <style>
      .bg     { fill: #f8fafc; }
      .entity { fill: #ffffff; stroke: #94a3b8; stroke-width: 2; }
      .head   { fill: #e2e8f0; stroke: #94a3b8; stroke-width: 2; }
      .title  { font: 700 17px Arial, sans-serif; fill: #0f172a; }
      .field  { font: 400 14px Arial, sans-serif; fill: #1e293b; }
      .ext    { font: 400 14px Arial, sans-serif; fill: #7c3aed; }
      .small  { font: 400 13px Arial, sans-serif; fill: #475569; }
      .note   { font: 400 12px Arial, sans-serif; fill: #6b7280; font-style: italic; }
      .rel    { stroke: #64748b; stroke-width: 2; fill: none; }
      .lbl    { font: 600 12px Arial, sans-serif; fill: #334155; }
    </style>
    <marker id="arr" markerWidth="10" markerHeight="10" refX="9" refY="5"
            orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L10,5 L0,10 z" fill="#64748b"/>
    </marker>
  </defs>

  <rect class="bg" x="0" y="0" width="1100" height="900"/>
  <text x="40" y="40" class="title">ER-схема БД: Order Service (сервис заказов)</text>

  <!-- ══════════════════════════════════════
       ТАБЛИЦЫ
         Row 1 (y=80):   orders  (центр)
         Row 2 (y=500):  order_items (слева)   order_status_history (справа)

       Routing corridors:
         y=450  — горизонтальный коридор между рядами
         x=250  — центр order_items (для вертикали стрелки 1)
         x=730  — центр status_history (для вертикали стрелки 2)
       ══════════════════════════════════════ -->

  <!-- orders -->
  <g transform="translate(300,80)">
    <rect class="entity" x="0" y="0" width="380" height="325" rx="16"/>
    <rect class="head"   x="0" y="0" width="380" height="54"  rx="16"/>
    <rect class="head"   x="0" y="36" width="380" height="18"/>
    <text x="20" y="33" class="title">orders</text>
    <text x="20" y="84"  class="field">PK  id</text>
    <text x="20" y="110" class="field">    customer_name</text>
    <text x="20" y="136" class="field">    customer_phone</text>
    <text x="20" y="162" class="field">    customer_email</text>
    <text x="20" y="188" class="field">    comment</text>
    <text x="20" y="214" class="field">    status</text>
    <text x="20" y="240" class="field">    total_amount</text>
    <text x="20" y="266" class="field">    created_at</text>
    <text x="20" y="292" class="field">    updated_at</text>
  </g>

  <!-- order_items -->
  <g transform="translate(60,500)">
    <rect class="entity" x="0" y="0" width="380" height="300" rx="16"/>
    <rect class="head"   x="0" y="0" width="380" height="54"  rx="16"/>
    <rect class="head"   x="0" y="36" width="380" height="18"/>
    <text x="20" y="33" class="title">order_items</text>
    <text x="20" y="84"  class="field">PK  id</text>
    <text x="20" y="110" class="field">FK  order_id</text>
    <text x="20" y="136" class="ext" >*   good_id</text>
    <text x="20" y="162" class="field">    good_title</text>
    <text x="20" y="188" class="field">    good_sku</text>
    <text x="20" y="214" class="field">    price</text>
    <text x="20" y="240" class="field">    quantity</text>
    <text x="20" y="266" class="field">    subtotal</text>
  </g>

  <!-- order_status_history -->
  <g transform="translate(540,500)">
    <rect class="entity" x="0" y="0" width="380" height="275" rx="16"/>
    <rect class="head"   x="0" y="0" width="380" height="54"  rx="16"/>
    <rect class="head"   x="0" y="36" width="380" height="18"/>
    <text x="20" y="33" class="title">order_status_history</text>
    <text x="20" y="84"  class="field">PK  id</text>
    <text x="20" y="110" class="field">FK  order_id</text>
    <text x="20" y="136" class="field">    old_status</text>
    <text x="20" y="162" class="field">    new_status</text>
    <text x="20" y="188" class="field">    changed_by</text>
    <text x="20" y="214" class="field">    change_reason</text>
    <text x="20" y="240" class="field">    changed_at</text>
  </g>

  <!-- ══════════════════════════════════════
       СВЯЗИ
       ══════════════════════════════════════ -->

  <!-- 1. orders (1) ──► order_items (N)   [order_id FK]
       orders.bottom(440,405) → ↓ → y=450 → ← → order_items.top(250,500)
       Коридор y=405–500 свободен (45px зазор с каждой стороны) -->
  <path class="rel" marker-end="url(#arr)"
        d="M 440,405 L 440,450 L 250,450 L 250,500"/>
  <text x="320" y="443" class="lbl">1 : N</text>

  <!-- 2. orders (1) ──► order_status_history (N)   [order_id FK]
       orders.bottom(540,405) → ↓ → y=450 → → → status_history.top(730,500)
       Коридор y=450 симметричен стрелке 1 -->
  <path class="rel" marker-end="url(#arr)"
        d="M 540,405 L 540,450 L 730,450 L 730,500"/>
  <text x="608" y="443" class="lbl">1 : N</text>

  <!-- ══════════════════════════════════════
       ЗНАЧЕНИЯ ПОЛЯ status (ENUM)
       ══════════════════════════════════════ -->
  <rect x="300" y="440" width="0" height="0"/><!-- anchor, не рисуется -->

  <!-- Enum box для status -->
  <rect x="60" y="80" width="210" height="140" rx="12"
        fill="#fff7ed" stroke="#fed7aa" stroke-width="1.5"/>
  <text x="78" y="108" style="font:700 13px Arial;fill:#92400e">status (enum)</text>
  <text x="78" y="132" class="small">new</text>
  <text x="78" y="154" class="small">processing</text>
  <text x="78" y="176" class="small">completed</text>
  <text x="78" y="198" class="small">cancelled</text>

  <!-- пунктир от status enum к orders.status -->
  <path stroke="#fed7aa" stroke-width="1.5" stroke-dasharray="6 5" fill="none"
        d="M 270,175 L 300,214"/>

  <!-- ══════════════════════════════════════
       ЛЕГЕНДА
       ══════════════════════════════════════ -->
  <rect x="890" y="80" width="190" height="200" rx="14"
        fill="#ffffff" stroke="#cbd5e1" stroke-width="1.5"/>
  <text x="908" y="112" style="font:700 13px Arial;fill:#0f172a">Обозначения</text>
  <text x="908" y="136" class="small">PK — первичный ключ</text>
  <text x="908" y="158" class="small">FK — внешний ключ</text>
  <text x="908" y="180" class="small">1:N — один-ко-многим</text>
  <text x="908" y="202" style="font:400 13px Arial;fill:#7c3aed">*   — внешняя ссылка</text>

  <!-- ══════════════════════════════════════
       СНОСКА
       ══════════════════════════════════════ -->
  <text x="60" y="850" class="note">
    * good_id — ссылка на товар из Catalog Service. Хранится как целое число.
  </text>
  <text x="60" y="870" class="note">
    Снепшоты (good_title, good_sku, price) фиксируют данные товара на момент оформления заказа.
  </text>

</svg>