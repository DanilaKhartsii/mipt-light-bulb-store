version: "3.9"

services:
  goods-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: goods_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - goods_db_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  order-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: order_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - order_db_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  goods-service:
    build: ./goods-service
    ports:
      - "8001:8001"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@goods-db:5432/goods_db
    depends_on:
      goods-db:
        condition: service_healthy

  order-service:
    build: ./order-service
    ports:
      - "8002:8002"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@order-db:5432/order_db
      GOODS_SERVICE_URL: http://goods-service:8001
    depends_on:
      order-db:
        condition: service_healthy
      goods-service:
        condition: service_started

volumes:
  goods_db_data:
  order_db_data: